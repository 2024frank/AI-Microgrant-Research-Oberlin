name: Oberlin Community Calendar Collect

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Optional sourceId to run (e.g. oberlin_college)"
        required: false
        default: ""
      days_ahead:
        description: "Future window in days"
        required: false
        default: "180"
  schedule:
    # Every day at 6:15am UTC (adjust as desired)
    - cron: "15 6 * * *"

permissions:
  contents: read

concurrency:
  group: oberlin-community-calendar-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        working-directory: dashboard
        run: npm ci

      - name: Collect
        working-directory: dashboard
        run: |
          set -euo pipefail
          ONLY="${{ inputs.only }}"
          DAYS="${{ inputs.days_ahead }}"
          if [ -n "${ONLY}" ]; then
            node scripts/oberlin-community-calendar-collect.mjs --verbose --only "${ONLY}" --days-ahead "${DAYS}"
          else
            node scripts/oberlin-community-calendar-collect.mjs --verbose --days-ahead "${DAYS}"
          fi

