name: Localist → CommunityHub Sync

on:
  schedule:
    - cron: "0 * * * *"  # runs every hour automatically — no need to click Start again
  workflow_dispatch:       # Start button triggers an immediate run outside the schedule
  # ─── Adding a new source? Copy this workflow and:
  #   1. Change the name above
  #   2. Change the cron if a different interval is needed
  #   3. Change the "run" step to point to your new ingest script
  #   4. Keep schedule + workflow_dispatch so it auto-runs AND is manually triggerable

permissions:
  contents: write           # needed to commit pushed_ids.json back

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          FALLBACK_EMAIL: ${{ secrets.FALLBACK_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node sync.js

      - name: Commit updated pushed_ids.json
        run: |
          git config user.name "2024frank"
          git config user.email "frankkusiap@gmail.com"
          git add pushed_ids.json
          git diff --staged --quiet || git commit -m "chore: update pushed_ids.json"
          # Pull rebase to absorb any commits that landed while the sync was running,
          # then push — prevents rejection when main moved forward during the 8-min run.
          git pull --rebase origin main
          git push
