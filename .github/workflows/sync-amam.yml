name: AMAM → CommunityHub Sync

on:
  schedule:
    - cron: "0 * * * *"  # runs every hour automatically — no need to click Start again
  workflow_dispatch:       # Start button triggers an immediate run outside the schedule
  # ─── Adding a new source? Copy this workflow and:
  #   1. Change the name above
  #   2. Change the cron if a different interval is needed
  #   3. Change the "run" step to point to your new ingest script
  #   4. Keep schedule + workflow_dispatch so it auto-runs AND is manually triggerable

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run AMAM sync pipeline
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FALLBACK_EMAIL: ${{ secrets.FALLBACK_EMAIL }}
        run: node sync-amam.js
