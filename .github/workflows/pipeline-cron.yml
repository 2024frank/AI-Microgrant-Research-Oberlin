name: Pipeline Cron

on:
  schedule:
    # Runs every hour — actual frequency is controlled by the Sources page schedule setting
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          curl -f -X POST "${{ secrets.APP_URL }}/api/pipeline/trigger" \
            -H "Content-Type: application/json" \
            -d '{"sourceId":"localist-oberlin","sourceName":"Localist – Oberlin College Calendar"}' \
            --max-time 30
