name: Pipeline Cron

on:
  schedule:
    # Runs every hour — actual frequency is controlled by the Sources page schedule setting
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline cron endpoint
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/pipeline/cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 30
