name: Pipeline Cron (Backup)

# Primary scheduling is handled by Vercel cron in vercel.json.
# This workflow is a backup that runs every 2 hours and does NOT
# fail the action if the trigger returns an error — it just logs it.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL secret not set — skipping trigger"
            exit 0
          fi

          echo "Triggering pipeline at ${{ secrets.APP_URL }}/api/pipeline/trigger ..."

          HTTP_CODE=$(curl -s -o /tmp/response.json \
            -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/pipeline/trigger" \
            -H "Content-Type: application/json" \
            -d '{"sourceId":"localist-oberlin","sourceName":"Localist – Oberlin College Calendar"}' \
            --max-time 60 \
            --retry 2 \
            --retry-delay 5)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/response.json

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Pipeline triggered successfully"
          else
            echo "⚠ Trigger returned $HTTP_CODE — pipeline may still run via Vercel cron"
          fi

          # Never fail — Vercel cron is the primary scheduler
          exit 0
