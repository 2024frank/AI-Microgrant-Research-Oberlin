name: Pipeline Cron (Backup)

# Primary scheduling: Vercel cron in vercel.json (every 6h).
# This is a best-effort backup trigger — never blocks CI.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        continue-on-error: true
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          [ -z "$APP_URL" ] && echo "APP_URL not set, skipping" && exit 0
          curl -s \
            -X POST "$APP_URL/api/pipeline/trigger" \
            -H "Content-Type: application/json" \
            -d '{"sourceId":"localist-oberlin","sourceName":"Localist – Oberlin College Calendar"}' \
            --max-time 45 \
            -w "\nHTTP %{http_code}\n"

      - name: Done
        run: echo "Cron step complete (pipeline runs via Vercel cron primarily)"
